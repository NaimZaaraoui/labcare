version: '3'
services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - proxy-net

  labcare:
    container_name: labcare-app
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    restart: always
    environment:
      - VIRTUAL_HOST=labcare.localhost,10.246.17.89
      - DATABASE_URL=file:/app/data/labcare.db
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - labcare-db:/app/data
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

volumes:
  labcare-db:
    driver: local   
networks:
  proxy-net:
    driver: bridge